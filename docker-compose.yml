version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: qms-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: queue_management
    volumes:
      - mongodb_data:/data/db
    networks:
      - qms-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: qms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - qms-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: qms-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/queue_management
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-changethisinsecurejwtsecretinproduction}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - qms-network
    volumes:
      - ./server/logs:/app/logs

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5000/api
    container_name: qms-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - qms-network

networks:
  qms-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local